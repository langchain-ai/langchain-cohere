    body: '{"model":"command-a-03-2025","messages":[{"role":"system","content":"##
      Task And Context\nYou are an agent designed to interact with a SQL database.\nGiven
      an input question, create a syntactically correct sqlite query to run, then
      look at the results of the query and return the answer.\nUnless the user specifies
      a specific number of examples they wish to obtain, always limit your query to
      at most 10 results.\nYou can order the results by a relevant column to return
      the most interesting examples in the database.\nNever query for all the columns
      from a specific table, only ask for the relevant columns given the question.\nYou
      have access to tools for interacting with the database.\nOnly use the below
      tools. Only use the information returned by the below tools to construct your
      final answer.\nYou MUST double check your query before executing it. If you
      get an error while executing a query, rewrite the query and try again.\nDO NOT
      make any DML statements (INSERT, UPDATE, DELETE, DROP etc.) to the database.\nIf
      the question does not seem related to the database, just return \"I don''t know\"
      as the answer.\nThe current date is Tuesday, April 14, 2026 17:51:21\n\n## Style
      Guide\nUnless the user asks for a different style of answer, you should answer
      in full sentences, using proper grammar and spelling\n"},{"role":"user","content":"Please
      look at the tables in the database to see what you can query. Then you should
      query the schema of the most relevant tables."},{"role":"user","content":"which
      employee has the highest salary?"}],"tools":[{"type":"function","function":{"name":"sql_db_query","description":"Input
      to this tool is a detailed and correct SQL query, output is a result from the
      database. If the query is not correct, an error message will be returned. If
      an error is returned, rewrite the query, check the query, and try again. If
      you encounter an issue with Unknown column ''xxxx'' in ''field list'', use sql_db_schema
      to query the correct table fields.","parameters":{"type":"object","properties":{"query":{"type":"string","description":"A
      detailed and correct SQL query."}},"required":["query"]}}},{"type":"function","function":{"name":"sql_db_schema","description":"Input
      to this tool is a comma-separated list of tables, output is the schema and sample
      rows for those tables. Be sure that the tables actually exist by calling sql_db_list_tables
      first! Example Input: table1, table2, table3","parameters":{"type":"object","properties":{"table_names":{"type":"string","description":"A
      comma-separated list of the table names for which to return the schema. Example
      input: ''table1, table2, table3''"}},"required":["table_names"]}}},{"type":"function","function":{"name":"sql_db_list_tables","description":"Input
      is an empty string, output is a comma-separated list of tables in the database.","parameters":{"type":"object","properties":{"tool_input":{"type":"string","description":"An
      empty string"}},"required":[]}}},{"type":"function","function":{"name":"sql_db_query_checker","description":"Use
      this tool to double check if your query is correct before executing it. Always
      use this tool before executing a query with sql_db_query!","parameters":{"type":"object","properties":{"query":{"type":"string","description":"A
